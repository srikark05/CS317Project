{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">WNFC <span>Database</span></h1>
</div>

<div class="cards">
    <div class="card">
        <div class="card-label">Teams</div>
        <div class="card-value">{{ stats.teams }}</div>
    </div>
    <div class="card">
        <div class="card-label">Players</div>
        <div class="card-value">{{ stats.players }}</div>
    </div>
    <div class="card">
        <div class="card-label">Season Rows</div>
        <div class="card-value">{{ stats.season_rows }}</div>
    </div>
</div>

<div class="section-card">
    <div class="section-card-header">
        <span class="section-card-title">Quick Links</span>
    </div>
    <div style="padding: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
        <a href="/players" class="btn btn-primary">Players</a>
        <a href="/teams" class="btn btn-primary">Teams</a>
        <a href="/games" class="btn btn-primary">Games</a>
        <a href="/trades" class="btn btn-primary">Trades</a>
        <a href="/coaches" class="btn btn-primary">Coaches</a>
    </div>
</div>
{% endblock %}
