{% extends "Base.html" %}
{% block title %}Delete Game{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Delete <span style="color:#d4af37">Game</span></h1>
  <p class="subtitle">
    <a href="{{ url_for('admin.dashboard') }}" style="color:#013369;font-weight:700;">&larr; Dashboard</a>
  </p>
</div>

<div class="card" style="max-width:400px; margin: 2rem auto; padding: 2rem;">
  <form method="POST">
    <div style="margin-bottom:1rem;">
      <label>Game Date</label>
      <input type="date" name="game_date" required>
    </div>

    <div style="margin-bottom:1rem;">
      <label>Week</label>
      <input type="number" name="week" required>
    </div>

    <div style="margin-bottom:1rem;">
      <label>Season</label>
      <input type="number" name="season" value="2025" required>
    </div>

    <button type="submit" class="btn-primary">DELETE GAME</button>
  </form>
</div>
{% endblock %}
