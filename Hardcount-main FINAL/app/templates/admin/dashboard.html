{% extends "Base.html" %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Admin <span style="color:#d4af37">Dashboard</span></h1>
  <p class="subtitle">Logged in as administrator</p>
</div>

<div class="stats-grid mb-2">
  <div class="stat-card">
    <div class="stat-label">Add Game</div>
    <div style="margin-top:0.75rem;">
      <a href="{{ url_for('admin.add_game') }}"
         style="display:inline-block;padding:0.5rem 1.1rem;background:#013369;color:#fff;border-radius:4px;font-family:'Roboto Condensed',sans-serif;font-weight:700;letter-spacing:0.05em;font-size:0.85rem;">
        ADD GAME &rsaquo;
      </a>
    </div>
    <p class="text-muted" style="margin-top:0.5rem;font-size:0.8rem;">Record a new game with coach and player stats.</p>
  </div>

  <div class="stat-card">
    <div class="stat-label">View Players</div>
    <div style="margin-top:0.75rem;">
      <a href="{{ url_for('players.index') }}"
         style="display:inline-block;padding:0.5rem 1.1rem;background:#013369;color:#fff;border-radius:4px;font-family:'Roboto Condensed',sans-serif;font-weight:700;letter-spacing:0.05em;font-size:0.85rem;">
        PLAYERS &rsaquo;
      </a>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-label">View Teams</div>
    <div style="margin-top:0.75rem;">
      <a href="{{ url_for('teams.index') }}"
         style="display:inline-block;padding:0.5rem 1.1rem;background:#013369;color:#fff;border-radius:4px;font-family:'Roboto Condensed',sans-serif;font-weight:700;letter-spacing:0.05em;font-size:0.85rem;">
        TEAMS &rsaquo;
      </a>
    </div>
  </div>

  <div class="stat-card">
    <div class="stat-label">View Coaches</div>
    <div style="margin-top:0.75rem;">
      <a href="{{ url_for('coaches.index') }}"
         style="display:inline-block;padding:0.5rem 1.1rem;background:#013369;color:#fff;border-radius:4px;font-family:'Roboto Condensed',sans-serif;font-weight:700;letter-spacing:0.05em;font-size:0.85rem;">
        COACHES &rsaquo;
      </a>
    </div>
  </div>
</div>

<div style="margin-top:1rem;">
  <a href="{{ url_for('login.logout') }}"
     style="color:#6c757d;font-weight:700;font-family:'Roboto Condensed',sans-serif;font-size:0.85rem;letter-spacing:0.05em;">
    LOGOUT &rsaquo;
  </a>
</div>
{% endblock %}
