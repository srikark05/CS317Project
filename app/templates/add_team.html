{% extends "base.html" %}

{% block content %}
<section>
    <h2>Add New Team</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post" class="form">
        <div class="form-group">
            <label for="name">Team Name *</label>
            <input type="text" id="name" name="name" required maxlength="100">
        </div>
        
        <div class="form-group">
            <label for="division">Division</label>
            <input type="text" id="division" name="division" maxlength="100">
        </div>
        
        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" maxlength="100">
        </div>
        
        <div class="form-group">
            <label for="president">President</label>
            <input type="text" id="president" name="president" maxlength="100">
        </div>
        
        <div class="form-group">
            <label for="tv_tag">TV Tag</label>
            <input type="text" id="tv_tag" name="tv_tag" maxlength="10">
        </div>
        
        <button type="submit">Add Team</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
    </form>
</section>
{% endblock %}
